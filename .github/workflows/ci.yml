name: CI

on:
  push:
  pull_request:

jobs:
  test-template:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Check out the legacy template for parity tests
        uses: actions/checkout@v4
        with:
          repository: otto-torino/django-cookiecutter
          path: .parity/django-cookiecutter
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install "copier>=9.3,<10" cookiecutter coverage mypy
      - name: Type check template tooling
        run: mypy tasks tests
      - name: Test template
        env:
          COOKIECUTTER_TEMPLATE: ${{ github.workspace }}/.parity/django-cookiecutter
          RUN_COOKIECUTTER_PARITY: "1"
        run: |
          coverage run --source=tasks -m unittest -v
          coverage xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./coverage.xml
          use_oidc: true
