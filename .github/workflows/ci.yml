name: CI

on:
  push:
  pull_request:

jobs:
  test-template:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install "copier>=9.3,<10" coverage
      - name: Test template
        run: |
          coverage run --source=tasks -m unittest -v
          coverage xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./coverage.xml
          use_oidc: true
