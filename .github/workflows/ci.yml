name: CI

on:
  push:
  pull_request:

jobs:
  test-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Copier
        run: python -m pip install "copier>=9.3,<10"
      - name: Test template
        run: python -m unittest -v

