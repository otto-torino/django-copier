name: CI

on:
  push:
  pull_request:

jobs:
  test-template:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: django-copier
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          path: django-copier
      - name: Check out the legacy template for parity tests
        uses: actions/checkout@v5
        with:
          repository: otto-torino/django-cookiecutter
          path: django-cookiecutter
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install "copier>=9.3,<10" cookiecutter coverage mypy
      - name: Type check template tooling
        run: mypy tasks tests
      - name: Test template
        env:
          COOKIECUTTER_TEMPLATE: ${{ github.workspace }}/django-cookiecutter
          RUN_COOKIECUTTER_PARITY: "1"
        run: |
          coverage run --source=tasks -m unittest -v
          coverage xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./django-copier/coverage.xml
          use_oidc: true

  test-generated-project:
    needs: test-template
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Copier
        run: python -m pip install "copier>=9.3,<10"
      - name: Generate the full project
        run: |
          copier copy --trust --defaults --vcs-ref=HEAD \
            --data project_name="Generated CI Project" \
            --data repo_name=generated-ci-project \
            --data use_cabinet=true \
            --data use_sorl_thumbnail=true \
            --data use_translations=true \
            --data languages='[it,en,fr]' \
            --data default_language=it \
            . "${{ runner.temp }}/generated-ci-project"
      - name: Bootstrap the generated project
        working-directory: ${{ runner.temp }}/generated-ci-project
        run: make bootstrap
      - name: Run generated Django tests
        working-directory: ${{ runner.temp }}/generated-ci-project
        run: make test
      - name: Show service logs after failure
        if: failure()
        working-directory: ${{ runner.temp }}/generated-ci-project
        run: docker compose logs --no-color
      - name: Remove generated services and volumes
        if: always()
        working-directory: ${{ runner.temp }}/generated-ci-project
        run: make clean
