_min_copier_version: "9.3.0"
_subdirectory: template
_templates_suffix: .jinja

_envops:
  block_start_string: "[%%"
  block_end_string: "%%]"
  variable_start_string: "[["
  variable_end_string: "]]"
  comment_start_string: "[#"
  comment_end_string: "#]"
  keep_trailing_newline: true
  undefined: jinja2.StrictUndefined

_exclude:
  - "[[ repo_name ~ '/cabinet' if not use_cabinet else '.copier-never-match' ]]"
  - "[[ repo_name ~ '/pages/translation.py' if not use_translations else '.copier-never-match' ]]"
  - "[[ repo_name ~ '/cabinet/translation.py' if not use_translations else '.copier-never-match' ]]"
  - "[[ repo_name ~ '/tagall/translation.py' if not use_translations else '.copier-never-match' ]]"
  - "[[ repo_name ~ '/core/translation.py' if not use_translations else '.copier-never-match' ]]"

_tasks:
  - command:
      - "[[ _copier_python ]]"
      - "[[ _copier_conf.src_path ]]/tasks/preflight.py"
      - "--repo-name"
      - "[[ repo_name ]]"
      - "--languages"
      - "[[ languages | join(',') ]]"
      - "--default-language"
      - "[[ default_language ]]"
      - "--use-translations"
      - "[[ use_translations | lower ]]"
    when: "[[ _copier_operation == 'copy' ]]"
  - command:
      - "[[ _copier_python ]]"
      - "[[ _copier_conf.src_path ]]/tasks/post_copy.py"
      - "--repo-name"
      - "[[ repo_name ]]"
      - "--db-user"
      - "[[ db_user ]]"
    when: "[[ _copier_operation == 'copy' ]]"

project_name:
  type: str
  default: My New Project
  help: Human-readable project name
  validator: >-
    [[
      'Use a non-empty, single-line name without template delimiters.'
      if not (project_name | regex_search('^[^\\r\\n]+$'))
      or ('[' ~ '[') in project_name
      or ('[' ~ '%' ~ '%') in project_name
      or ('{' ~ '{') in project_name
      or ('{' ~ '%') in project_name
      else ''
    ]]

project_description:
  type: str
  default: My New Project description
  help: Short description used in the README
  validator: >-
    [[
      'Use a non-empty, single-line description without template delimiters.'
      if not (project_description | regex_search('^[^\\r\\n]+$'))
      or ('[' ~ '[') in project_description
      or ('[' ~ '%' ~ '%') in project_description
      or ('{' ~ '{') in project_description
      or ('{' ~ '%') in project_description
      else ''
    ]]

repo_name:
  type: str
  default: "[[ project_name | lower | replace(' ', '-') ]]"
  help: Repository slug and application directory name
  validator: >-
    [[
      'Use lowercase letters, digits and single hyphens only.'
      if not (repo_name | regex_search('^[a-z0-9]+(?:-[a-z0-9]+)*$'))
      else ''
    ]]

use_cabinet:
  type: bool
  default: false
  help: Include the cabinet application

use_sorl_thumbnail:
  type: bool
  default: true
  help: Use sorl-thumbnail instead of the local fallback

use_translations:
  type: bool
  default: false
  help: Enable django-modeltranslation and localized URLs

languages:
  type: yaml
  default: [it, en]
  when: "[[ use_translations ]]"
  help: YAML list containing at least two Django language codes
  validator: >-
    [[
      'Use at least two unique Django language codes such as [it, en].'
      if use_translations and (
        languages is string
        or languages is not iterable
        or languages | length < 2
        or languages | unique | list | length != languages | length
        or languages | select('string') | list | length != languages | length
        or languages
          | map('regex_search', '^[a-z]{2,3}(?:-[A-Za-z0-9]{2,8})*$')
          | select
          | list
          | length != languages | length
      )
      else ''
    ]]

default_language:
  type: str
  default: it
  when: "[[ use_translations ]]"
  help: Default language, included in the languages list
  validator: >-
    [[
      'Use one of the configured language codes.'
      if use_translations and (
        languages is string
        or languages is not iterable
        or not (default_language | regex_search(
          '^[a-z]{2,3}(?:-[A-Za-z0-9]{2,8})*$'
        ))
        or default_language not in languages
      )
      else ''
    ]]

timezone:
  type: str
  default: Europe/Rome
  help: Timezone used by Django and the Docker images
  validator: >-
    [[
      'Use a single-line IANA timezone such as Europe/Rome.'
      if not (timezone | regex_search(
        '^[A-Za-z0-9._+-]+(?:/[A-Za-z0-9._+-]+)*$'
      ))
      else ''
    ]]

author:
  type: str
  default: otto
  help: GitHub organization or username
  validator: >-
    [[
      'Use a valid GitHub organization or username.'
      if not (author | regex_search(
        '^[A-Za-z0-9](?:[A-Za-z0-9-]{0,37}[A-Za-z0-9])?$'
      ))
      else ''
    ]]

email:
  type: str
  default: logs@otto.srl
  help: Default application email address
  validator: >-
    [[
      'Use a valid single-line email address.'
      if not (email | regex_search(
        '^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}$'
      ))
      else ''
    ]]

db_user:
  type: str
  default: "[[ repo_name ]]"
  help: Local PostgreSQL user
  validator: >-
    [[
      'Use up to 63 lowercase letters, digits, underscores or hyphens.'
      if not (db_user | regex_search('^[a-z_][a-z0-9_-]{0,62}$'))
      else ''
    ]]
