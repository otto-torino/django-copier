<div style="background-color: {{ object.background_color }}">
    {% if object.show_name %}<h3 class="font-medium">{{ object.name }}</h3>{% endif %}
    <div id="rss-feed-content-{{ object.id }}"></div>
    <script>
    (function ($) {
        $.get( "{% url 'pages:page-rss-feed-preview' object.id %}", function( data ) {
          $( "#rss-feed-content-{{ object.id }}" ).html( data );
        });
    })(Baton.jQuery)
    </script>
</div>
