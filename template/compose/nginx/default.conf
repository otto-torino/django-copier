# Internal Nginx serves static and uploaded media from shared Docker volumes,
# then proxies dynamic requests to Gunicorn. The host's Nginx reaches this
# service through the loopback-only port published by Docker Compose.

map $sent_http_content_type $expires {
  default                off;
  text/html              epoch;
  text/css               max;
  application/javascript max;
  ~image/                max;
  ~video/                max;
}

map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  ""      $scheme;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 20M;

  expires $expires;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1100;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml;

  location /static/ {
    alias /app/static/;
  }

  location /media/ {
    alias /app/media/;
    autoindex off;
    add_header X-Content-Type-Options nosniff always;
    add_header Content-Security-Policy "default-src 'none'; img-src 'self'; style-src 'unsafe-inline'; sandbox" always;
  }

  location / {
    proxy_pass http://app:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_read_timeout 60s;
  }
}
